
services:

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - qdrant_storage:/qdrant/storage

    restart: unless-stopped

  api:
    build: .
    container_name: python-tutor-rag

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - qdrant
      - redis


    restart: unless-stopped

  redis:
    image: redis:7-alpine

    container_name: redis

    ports:
    - "6379:6379"

  # frontend:
  #   build: ./frontend

  #   ports:
  #     - "3000:80"

  #   depends_on:
  #     - api



volumes:
  qdrant_storage: